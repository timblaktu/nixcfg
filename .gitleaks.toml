# Use default gitleaks rules 
[extend]
useDefault = true

# Minimal allowlist - only exclude impossible placeholders and known false positives
[allowlist]
description = "Exclude standardized impossible placeholders and legitimate config patterns"
regexes = [
    '''<PLACEHOLDER_.*_IMPOSSIBLE>''',
    '''prohibit-password''',
    '''forced-commands-only''',
    '''age1[a-z0-9]{58}''',
    '''tblack-t14-nixos''',
    '''ANTHROPIC_API_KEY=""''',
]
paths = [
    '''.*\.template$''',
    '''secrets/.*INSTRUCTIONS.*''',
    '''claude-runtime/.*\.jsonl$''',
]
# Specific false positive fingerprints (commit:file:rule:line)
fingerprints = [
    # Comment explaining Bedrock auth env vars (not actual secrets)
    "f8045d8b4f3e3a44f4c7eb407af6ffb350ebbe5a:modules/programs/claude-code/_hm/lib.nix:generic-api-key:76",
]